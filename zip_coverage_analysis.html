<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distressed ZIP Coverage Analysis</title>
  <style>
    :root {
      --bg: #f2f7f5;
      --surface: #ffffff;
      --border: #cfe0d8;
      --text: #102118;
      --muted: #4b6558;
      --brand: #1c6c4f;
      --brand-strong: #14503b;
      --warn: #b54708;
      --danger: #b42318;
      --shadow: 0 14px 30px rgba(14, 48, 34, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #d6ece3 0%, transparent 32%),
        radial-gradient(circle at 100% 100%, #eaf6ef 0%, transparent 28%),
        var(--bg);
      padding: 18px;
    }

    .app {
      max-width: 1220px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(140deg, #e4f2ea 0%, #f8fcfa 80%);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.9rem);
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.45;
    }

    .body {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
      align-items: start;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-weight: 600;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font: 500 0.92rem/1.4 Consolas, "Courier New", monospace;
      color: var(--text);
      background: #fbfefc;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      height: 42px;
      border: 0;
      border-radius: 10px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--brand);
      cursor: pointer;
    }

    button:hover { background: var(--brand-strong); }

    button.secondary {
      background: #e6f2ec;
      color: var(--brand-strong);
      border: 1px solid var(--border);
    }

    .status {
      min-height: 1.2rem;
      color: var(--warn);
      font-size: 0.92rem;
    }

    .kpis {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .kpi {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, #f6fbf8 0%, #ffffff 100%);
      padding: 12px;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .kpi .value {
      margin-top: 4px;
      font-size: 1.02rem;
      font-weight: 800;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: auto;
      max-height: 520px;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 740px;
      font-size: 0.9rem;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #e6efea;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #edf7f2;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #24533f;
    }

    tr.zero td {
      background: #fff4f2;
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .grid,
      .kpis {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="head">
        <h1>Distressed ZIP Coverage Analysis</h1>
        <div class="sub">Compare your outreach event data to a distressed ZIP list and identify the least-served ZIP codes first.</div>
      </div>

      <div class="body">
        <div class="grid">
          <div class="field">
            <label for="distressedInput">Distressed ZIP list (paste any text; 5-digit ZIPs are extracted automatically)</label>
            <textarea id="distressedInput" placeholder="Paste your distressed ZIP list here. You can paste numbers, docs, or mixed text."></textarea>
          </div>

          <div class="field">
            <label for="csvFileInput">Outreach CSV file (Jan-May 13 geocoded outreach data)</label>
            <input id="csvFileInput" type="file" accept=".csv,text/csv" />
            <div class="toolbar">
              <button id="loadDefaultBtn" type="button">Load Default CSV</button>
              <button id="analyzeBtn" type="button">Analyze Coverage</button>
              <button id="clearBtn" type="button" class="secondary">Clear Results</button>
            </div>
            <div class="status" id="status"></div>
          </div>
        </div>

        <div class="kpis">
          <div class="kpi"><div class="label">Distressed ZIPs</div><div class="value" id="kpiDistressed">0</div></div>
          <div class="kpi"><div class="label">ZIPs with outreach</div><div class="value" id="kpiServed">0</div></div>
          <div class="kpi"><div class="label">ZIPs with no outreach</div><div class="value" id="kpiUnserved">0</div></div>
          <div class="kpi"><div class="label">Coverage rate</div><div class="value" id="kpiCoverage">0.0%</div></div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>ZIP</th>
                <th>City</th>
                <th>Events</th>
                <th>Total Attendees/Views</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const distressedInputEl = document.getElementById("distressedInput");
    const csvFileInputEl = document.getElementById("csvFileInput");
    const resultsBodyEl = document.getElementById("resultsBody");

    const kpiDistressedEl = document.getElementById("kpiDistressed");
    const kpiServedEl = document.getElementById("kpiServed");
    const kpiUnservedEl = document.getElementById("kpiUnserved");
    const kpiCoverageEl = document.getElementById("kpiCoverage");

    let loadedCsvText = "";
    let zipCityLookup = JSON.parse(document.getElementById("zip-city-lookup-data").textContent);

    function parseDistressedZips(text) {
      const matches = text.match(/\b\d{5}\b/g) || [];
      return [...new Set(matches)].sort();
    }

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];

        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += ch;
        }
      }

      out.push(current);
      return out;
    }

    function parseCsvRows(csvText) {
      const lines = csvText
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .filter((line) => line.trim().length > 0);

      if (!lines.length) return [];

      const headers = parseCsvLine(lines[0]).map((h) => h.trim());
      const rows = [];

      for (let i = 1; i < lines.length; i += 1) {
        const cols = parseCsvLine(lines[i]);
        const row = {};
        headers.forEach((header, idx) => {
          row[header] = (cols[idx] || "").trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function normalizeZip(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (digits.length < 5) return "";
      return digits.slice(0, 5);
    }

    function numeric(raw) {
      const num = Number(String(raw || "").replace(/,/g, "").trim());
      return Number.isFinite(num) ? num : 0;
    }

    function cityForZip(zip) {
      return zipCityLookup[zip] || "";
    }

    function computeCoverage(rows, distressedZips) {
      const outreachByZip = new Map();

      rows.forEach((row) => {
        const zip = normalizeZip(row.ZipCode || row.extracted_zip || row.zip || row.ZIP || "");
        if (!zip) return;

        if (!outreachByZip.has(zip)) {
          outreachByZip.set(zip, { events: 0, attendees: 0 });
        }

        const item = outreachByZip.get(zip);
        item.events += 1;
        item.attendees += numeric(row.AttendeesOrViews || row.Attendees || row.Views || "0");
      });

      const result = distressedZips.map((zip) => {
        const item = outreachByZip.get(zip) || { events: 0, attendees: 0 };
        const status = item.events > 0 ? "Served" : "Not Served";
        return { zip, city: cityForZip(zip), events: item.events, attendees: item.attendees, status };
      });

      result.sort((a, b) => {
        if (a.events !== b.events) return a.events - b.events;
        if (a.attendees !== b.attendees) return a.attendees - b.attendees;
        return a.zip.localeCompare(b.zip);
      });

      return result;
    }

    function renderRows(rows) {
      resultsBodyEl.innerHTML = "";

      rows.forEach((row, idx) => {
        const tr = document.createElement("tr");
        if (row.events === 0) tr.classList.add("zero");
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${row.zip}</td>
          <td>${row.city}</td>
          <td>${row.events}</td>
          <td>${Math.round(row.attendees).toLocaleString("en-US")}</td>
          <td>${row.status}</td>
        `;
        resultsBodyEl.appendChild(tr);
      });
    }

    function renderKpis(rows) {
      const total = rows.length;
      const served = rows.filter((r) => r.events > 0).length;
      const unserved = total - served;
      const coverage = total ? (served / total) * 100 : 0;

      kpiDistressedEl.textContent = String(total);
      kpiServedEl.textContent = String(served);
      kpiUnservedEl.textContent = String(unserved);
      kpiCoverageEl.textContent = `${coverage.toFixed(1)}%`;
    }

    function clearResults() {
      statusEl.textContent = "";
      resultsBodyEl.innerHTML = "";
      kpiDistressedEl.textContent = "0";
      kpiServedEl.textContent = "0";
      kpiUnservedEl.textContent = "0";
      kpiCoverageEl.textContent = "0.0%";
    }

    function analyze() {
      clearResults();

      const distressed = parseDistressedZips(distressedInputEl.value);
      if (!distressed.length) {
        statusEl.textContent = "Paste at least one 5-digit ZIP code in the distressed ZIP list.";
        return;
      }

      if (!loadedCsvText) {
        statusEl.textContent = "Load your outreach CSV first (use Load Default CSV or choose a file).";
        return;
      }

      const rows = parseCsvRows(loadedCsvText);
      if (!rows.length) {
        statusEl.textContent = "CSV appears empty or could not be parsed.";
        return;
      }

      const coverageRows = computeCoverage(rows, distressed);
      renderKpis(coverageRows);
      renderRows(coverageRows);
      statusEl.textContent = `Analysis complete: ranked ${coverageRows.length} distressed ZIP codes from least served to most served.`;
    }

    async function loadDefaultCsv() {
      statusEl.textContent = "Loading Jan-May 13 coverage data...";
      try {
        const csvResponse = await fetch("meetings_jan_may_13_geocoded.csv");
        if (!csvResponse.ok) throw new Error("CSV HTTP " + csvResponse.status);
        loadedCsvText = await csvResponse.text();

        statusEl.textContent = "Jan-May 13 CSV loaded. Running analysis...";
        analyze();
      } catch (err) {
        loadedCsvText = "";
        statusEl.textContent = "Could not auto-load default CSV in this browser context. Use the file picker to load the CSV manually.";
      }
    }

    document.getElementById("loadDefaultBtn").addEventListener("click", loadDefaultCsv);

    csvFileInputEl.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      loadedCsvText = await file.text();
      statusEl.textContent = `Loaded CSV: ${file.name}`;
    });

    document.getElementById("analyzeBtn").addEventListener("click", analyze);
    document.getElementById("clearBtn").addEventListener("click", clearResults);
